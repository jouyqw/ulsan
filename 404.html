<!DOCTYPE html>
<html lang="ko">
<head>

    <title>페이지를 찾을 수 없습니다 | 법무법인 우린</title>
    <meta name="description" content="요청하신 페이지를 찾을 수 없습니다. 울산변호사 강성수 홈페이지의 주요 업무분야와 법률 칼럼을 확인하세요.">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#17243d">
    <style>
        *{box-sizing:border-box}body{margin:0;background:#10192b;color:#fff;font-family:Arial,"Noto Sans KR",sans-serif}.wrap{min-height:100vh;display:grid;place-items:center;padding:28px}.card{width:min(720px,100%);padding:clamp(34px,7vw,72px);background:#17243d;border:1px solid rgba(255,255,255,.12);border-radius:14px;text-align:center}.code{display:block;color:#d8b56b;font-size:14px;font-weight:800;letter-spacing:.22em}.card h1{margin:18px 0 14px;font-size:clamp(32px,6vw,52px);letter-spacing:-.05em}.card p{margin:0 auto 28px;max-width:520px;color:rgba(255,255,255,.72);line-height:1.8}.links{display:flex;justify-content:center;flex-wrap:wrap;gap:10px}.links a{display:inline-flex;min-height:48px;align-items:center;padding:0 18px;border-radius:6px;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.24)}.links a:first-child{background:#d8b56b;color:#111827;border-color:#d8b56b;font-weight:800}
    </style>
</head>
<body>
    <main class="wrap">
        <section class="card">
            <span class="code">404 NOT FOUND</span>

            <nav class="links" aria-label="도움말 링크">
                <a href="/">홈으로 이동</a>
                <a href="/lawyer/">변호사 소개</a>
                <a href="/columns/">법률 칼럼</a>
                <a href="/cases/">성공사례</a>
            </nav>
        </section>
    </main>
</body>
</html>
